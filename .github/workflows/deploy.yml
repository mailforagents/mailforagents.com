name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mailforagents/mailforagents.com

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo check --locked --all-targets
      - run: cargo test --locked

  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: image
        run: echo "tag=sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: publish
    if: vars.COOLIFY_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Select immutable image and deploy it
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
          COOLIFY_RESOURCE_UUID: ${{ vars.COOLIFY_RESOURCE_UUID }}
          IMAGE_TAG: ${{ needs.publish.outputs.tag }}
        run: |
          test -n "$COOLIFY_URL"
          test -n "$COOLIFY_TOKEN"
          test -n "$COOLIFY_RESOURCE_UUID"
          curl --fail-with-body --silent --show-error \
            --request PATCH \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            --header "Content-Type: application/json" \
            --data "{\"docker_registry_image_name\":\"$REGISTRY/$IMAGE_NAME\",\"docker_registry_image_tag\":\"$IMAGE_TAG\"}" \
            "$COOLIFY_URL/api/v1/applications/$COOLIFY_RESOURCE_UUID"
          DEPLOY_RESPONSE=$(curl --fail-with-body --silent --show-error \
            --request GET \
            --header "Authorization: Bearer $COOLIFY_TOKEN" \
            "$COOLIFY_URL/api/v1/deploy?uuid=$COOLIFY_RESOURCE_UUID&force=true")
          DEPLOYMENT_UUID=$(jq --raw-output '.deployments[0].deployment_uuid' <<< "$DEPLOY_RESPONSE")
          test -n "$DEPLOYMENT_UUID"
          test "$DEPLOYMENT_UUID" != "null"
          for attempt in {1..60}; do
            STATUS=$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $COOLIFY_TOKEN" \
              "$COOLIFY_URL/api/v1/deployments/$DEPLOYMENT_UUID" | jq --raw-output '.status')
            case "$STATUS" in
              finished) exit 0 ;;
              failed|cancelled) echo "Coolify deployment $DEPLOYMENT_UUID ended with $STATUS" >&2; exit 1 ;;
            esac
            sleep 5
          done
          echo "Coolify deployment $DEPLOYMENT_UUID did not finish within five minutes" >&2
          exit 1
